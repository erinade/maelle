<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome Maelle</title>

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html, body {
    width: 100%;
    height: 100%;
    font-family: Garamond, Georgia, serif;
    overflow: hidden;
    background: #f3e0b3;
  }

  body {
    position: relative;
  }

  /* Parchment texture */
  body::before,
  body::after {
    content: "";
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }

  body::before {
    box-shadow: inset 0 0 90px rgba(0,0,0,0.25);
  }

  body::after {
    background:
      repeating-linear-gradient(45deg, rgba(0,0,0,0.015) 0px, rgba(0,0,0,0.015) 2px, transparent 2px, transparent 4px),
      repeating-linear-gradient(-45deg, rgba(0,0,0,0.015) 0px, rgba(0,0,0,0.015) 2px, transparent 2px, transparent 4px);
  }

  /* Ambient smoke */
  .smoke {
    position: absolute;
    inset: -50%;
    background: radial-gradient(rgba(255,255,255,0.04), transparent 60%);
    animation: drift 60s linear infinite;
    z-index: 1;
  }

  @keyframes drift {
    from { transform: translate(0, 0); }
    to   { transform: translate(25%, 25%); }
  }

  /* Toned-back red glow */
  .glow {
    position: absolute;
    top: 35%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 65%;
    max-width: 650px;
    height: 65%;
    max-height: 650px;
    background: rgba(140, 0, 0, 0.45); /* softer red */
    filter: blur(48px);               /* slightly wider blur */
    border-radius: 50%;
    animation: flicker 3s infinite alternate;
    z-index: 2;
  }

  @keyframes flicker {
    0%   { opacity: 0.38; }
    50%  { opacity: 0.55; }
    100% { opacity: 0.42; }
  }

  /* Handprint */
  .handprint {
    position: absolute;
    top: 35%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 60%;
    max-width: 600px;
    opacity: 0.9;
    z-index: 3;
  }

  /* Invitation text */
  .invitation {
    position: absolute;
    bottom: 5%;
    left: 50%;
    transform: translateX(-50%);
    z-index: 4;

    max-width: 620px;
    padding: 0.6rem 1.2rem;

    text-align: center;
    color: #000;
    font-size: clamp(1rem, 2.5vw, 1.3rem);
    font-weight: bold;
    line-height: 1.5;
    letter-spacing: 0.5px;

    background-color: rgba(243,224,179,0.22);
    border: 2px solid #f3e0b3;
    border-radius: 6px;
  }

  .invitation a {
    color: #000;
    font-weight: bold;
    text-decoration: underline;
  }

  .address {
    display: block;
    font-size: 0.9em;
    margin-top: 0.2em;
    opacity: 0.85;
  }

  /* Mobile layout */
  @media (max-width: 600px) {
    .handprint {
      top: 28%;
      width: 90%;
    }

    .glow {
      top: 28%;
      width: 95%;
      height: 95%;
      filter: blur(50px);
    }

    .invitation {
      bottom: 2%;
      max-width: 92%;
      font-size: clamp(0.95rem, 4vw, 1.15rem);
      padding: 0.5rem 0.9rem;
    }
  }
</style>
</head>

<body>

  <div class="smoke"></div>
  <div class="glow"></div>

  <img src="hand.png" alt="Exclusive Handprint" class="handprint">

  <div class="invitation">
    <p>
      You are cordially invited to an <strong>exclusive gathering</strong> in celebration of
      <strong>Maelle Rose Nadeau</strong>.<br>

      <strong>Smith Tower Observatory</strong><br>
      4/12 · 1:00 PM

      <span class="address">
        506 2nd Ave, Seattle, Washington
      </span>

      Kindly confirm your attendance via
      <a href="mailto:your-email@example.com">your-email@example.com</a>.

      <em style="display:block; margin-top:0.3em;">
        Admission, drinks, and food are provided for all invited guests.
      </em>
    </p>
  </div>

</body>
</html>
