<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exclusive Invitation</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }

  html, body {
    height: 100%;
    width: 100%;
    font-family: 'Garamond', serif;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #f3e0b3; /* parchment base */
    position: relative;
  }

  /* Parchment texture */
  body::before, body::after {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 0;
  }
  body::before { border-radius: 10px; box-shadow: inset 0 0 80px rgba(0,0,0,0.25); }
  body::after {
    background:
      repeating-linear-gradient(45deg, rgba(0,0,0,0.015) 0px, rgba(0,0,0,0.015) 2px, transparent 2px, transparent 4px),
      repeating-linear-gradient(-45deg, rgba(0,0,0,0.015) 0px, rgba(0,0,0,0.015) 2px, transparent 2px, transparent 4px);
  }

  /* Smoke/fog */
  .smoke {
    position: absolute;
    top:0; left:0;
    width:200%; height:200%;
    background: radial-gradient(rgba(255,255,255,0.05), transparent 60%);
    animation: moveSmoke 60s linear infinite;
    z-index:1;
    pointer-events:none;
  }
  @keyframes moveSmoke { from { transform: translate(0,0); } to { transform: translate(-50%, -50%); } }

  /* Red glow behind hand */
  .glow {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 60%; max-width: 600px;
    border-radius: 50%;
    filter: blur(50px);
    background-color: rgba(200,0,0,0.4);
    animation: flicker 2s infinite alternate;
    z-index:2;
  }
  @keyframes flicker {
    0% { opacity: 0.3; transform: translate(-50%, -50%) scale(1); }
    25% { opacity: 0.5; transform: translate(-50%, -50%) scale(1.02); }
    50% { opacity: 0.35; transform: translate(-50%, -50%) scale(0.98); }
    75% { opacity: 0.45; transform: translate(-50%, -50%) scale(1.01); }
    100% { opacity: 0.3; transform: translate(-50%, -50%) scale(1); }
  }

  /* Handprint moved up 15% */
  .handprint {
    position: absolute;
    top: 35%;
    left:50%;
    transform: translate(-50%, -50%);
    width: 60%; max-width:600px;
    opacity:0.85;
    z-index:3;
  }

  /* Invitation text */
  .invitation {
    position: absolute;
    bottom: 5%;
    z-index:4;
    max-width:600px;
    padding: 0.5rem 1rem;
    text-align: center;
    color: black;
    font-size: clamp(1rem, 2.5vw, 1.3rem);
    font-weight: bold;
    line-height: 1.5;
    letter-spacing: 0.5px;
    border: 2px solid #f3e0b3;
    border-radius: 6px;
    background-color: rgba(243,224,179,0.25);
  }

  .invitation a {
    color: black;
    font-weight: bold;
    text-decoration: underline;
  }

  /* Mobile optimization */
  @media (max-width:600px) {
    .invitation {
      bottom: 3%;
      font-size: clamp(0.95rem, 4vw, 1.2rem);
      padding: 0.4rem 0.8rem;
    }
    .handprint, .glow { width:85%; }
  }

</style>
</head>
<body>

<div class="smoke"></div>
<div class="glow"></div>
<img src="hand.png" alt="Exclusive Handprint" class="handprint">

<div class="invitation">
  <p>
    You are cordially invited to an <strong>exclusive gathering</strong> in celebration of <strong>Maelle Rose Nadeau</strong>.<br>
    Join us at the <strong>Smith Tower Observatory</strong> on <strong>4/12 at 1 PM</strong>.<br>
    Kindly confirm your attendance with Eric.<br>
    <em>Admission, drinks, and food are provided for all invited guests.</em>
  </p>
</div>

</body>
</html>
